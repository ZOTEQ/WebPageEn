<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredients Library | ZOTEQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/nav.css">
    <link rel="stylesheet" href="components/footer.css">
    <style>
        :root {
            --accent: #e07a5f;
            --accent-light: #f2a285;
            --accent-dark: #c4604a;
            --ocean: #3d8b8b;
            --sand: #d4a574;
            --text-primary: #ffffff;
            --text-secondary: #a8b3c4;
            --text-tertiary: #6b7a8f;
            --white: #ffffff;
            --bg-primary: #0a0f1a;
            --bg-secondary: #111827;
            --bg-dark: #080c14;
            --bg-card: rgba(17, 24, 39, 0.85);
            --bg-card-hover: rgba(30, 41, 59, 0.9);
            --success: #10b981;
            --error: #f43f5e;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --space-unit: 8px;
            --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===========================
           BUTTON STYLES - 独立按钮CLASS
           =========================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.3s var(--ease-out);
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--accent-light);
            box-shadow: 0 12px 32px rgba(224, 122, 95, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
        }

        .btn svg {
            transition: transform 0.3s var(--ease-out);
        }

        .btn:hover svg {
            transform: scale(1.1) rotate(5deg);
        }

        /* ===========================
           CARD STYLES - 独立卡片CLASS
           =========================== */
        .card {
            border-radius: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            transition: all 0.3s var(--ease-out);
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border-color: var(--border-hover);
        }

        .card-sm {
            border-radius: 12px;
        }

        .card-lg {
            border-radius: 20px;
        }

        .card-glass {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(24px);
        }

        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .background-hero {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60vh;
            background-image: url("images/ProductSearch_Hero_1920x768.jpg");
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        .background-hero::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(10, 15, 26, 0.9) 0%, rgba(10, 15, 26, 0.7) 50%, rgba(10, 15, 26, 0.3) 100%);
        }

        .main-content {
            position: relative;
            z-index: 1;
        }

        .reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.7s var(--ease-out), transform 0.7s var(--ease-out);
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }

        .page-header {
            padding: calc(var(--space-unit) * 22) calc(var(--space-unit) * 7) 0;
            text-align: center;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.25rem, 5vw, 3.75rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--white) 0%, rgba(255, 255, 255, 0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-wrapper {
            max-width: 720px;
            margin: calc(var(--space-unit) * 5) auto calc(var(--space-unit) * 5);
            padding: 0 calc(var(--space-unit) * 7);
        }

        .search-bar {
            width: 100%;
            position: relative;
        }

        .search-icon-left {
            position: absolute;
            left: calc(var(--space-unit) * 3);
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--text-tertiary);
            transition: color 0.25s var(--ease-out);
        }

        .search-bar:focus-within .search-icon-left {
            color: var(--accent);
        }

        .search-input {
            width: 100%;
            padding: calc(var(--space-unit) * 3) calc(var(--space-unit) * 12) calc(var(--space-unit) * 3) calc(var(--space-unit) * 10);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            font-size: 0.9375rem;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
            transition: all 0.3s var(--ease-out);
            backdrop-filter: blur(20px);
            text-align: left;
        }

        .search-input::placeholder {
            text-align: left;
            color: var(--text-tertiary);
            transition: color 0.25s var(--ease-out);
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(224, 122, 95, 0.08), 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .search-input:focus::placeholder {
            color: var(--text-secondary);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            padding: calc(var(--space-unit) * 1.5) calc(var(--space-unit) * 2.5);
            background: var(--accent);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s var(--ease-out);
        }

        .search-btn:hover {
            background: var(--accent-light);
            transform: translateY(-50%) scale(1.02);
            box-shadow: 0 4px 20px rgba(224, 122, 95, 0.3);
        }

        .search-btn:active {
            transform: translateY(-50%) scale(0.98);
        }

        .search-btn svg {
            width: 18px;
            height: 18px;
            color: white;
            display: block;
        }

        .table-section {
            padding: 0 calc(var(--space-unit) * 7) calc(var(--space-unit) * 14);
            position: relative;
            z-index: 2;
        }

        .table-container {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border-subtle);
            backdrop-filter: blur(24px);
            overflow: hidden;
            max-width: 1400px;
            margin: 0 auto;
            box-shadow: 
                0 4px 24px rgba(0, 0, 0, 0.15),
                0 12px 48px rgba(0, 0, 0, 0.1);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        .ingredients-table {
            width: 100%;
            border-collapse: collapse;
        }

        .ingredients-table thead {
            background: rgba(8, 12, 20, 0.6);
        }

        .ingredients-table th {
            text-align: left;
            padding: calc(var(--space-unit) * 3.5) calc(var(--space-unit) * 4);
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--text-tertiary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-subtle);
        }

        .ingredients-table td {
            padding: calc(var(--space-unit) * 3) calc(var(--space-unit) * 4);
            border-bottom: 1px solid var(--border-subtle);
            vertical-align: middle;
        }

        .ingredients-table tbody tr {
            transition: background 0.25s var(--ease-out);
        }

        .ingredients-table tbody tr td:first-child {
            position: relative;
        }

        .ingredients-table tbody tr td:first-child::before {
            content: '';
            position: absolute;
            left: -4px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            transform: scaleY(0);
            transition: transform 0.25s var(--ease-out);
            border-radius: 0 2px 2px 0;
        }

        .ingredients-table tbody tr:hover {
            background: rgba(224, 122, 95, 0.08);
        }

        .ingredients-table tbody tr:hover td:first-child::before {
            transform: scaleY(1);
        }

        .ingredients-table tbody tr:hover td {
            color: var(--text-primary);
        }

        .ingredients-table tbody tr:last-child td {
            border-bottom: none;
        }

        .ingredient-cell {
            display: flex;
            align-items: center;
            gap: calc(var(--space-unit) * 2.5);
        }

        .ingredient-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            font-weight: 700;
            background: linear-gradient(135deg, rgba(224, 122, 95, 0.12) 0%, rgba(61, 139, 139, 0.08) 100%);
            border: 1px solid rgba(224, 122, 95, 0.15);
            color: var(--accent-light);
            transition: all 0.25s var(--ease-out);
            flex-shrink: 0;
            cursor: pointer;
        }

        .ingredient-cell:hover .ingredient-icon {
            transform: scale(1.05);
            border-color: rgba(224, 122, 95, 0.3);
            box-shadow: 0 4px 12px rgba(224, 122, 95, 0.15);
        }

        .ingredient-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .ingredient-name {
            font-weight: 600;
            font-size: 0.9375rem;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .ingredient-group {
            font-size: 0.6875rem;
            color: var(--text-tertiary);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.02em;
        }

        .category-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 96px;
            padding: calc(var(--space-unit) * 0.75) calc(var(--space-unit) * 2);
            border-radius: 8px;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        .category-biobased {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .category-synthetic {
            background: rgba(99, 102, 241, 0.1);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .category-eu-nat {
            background: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .category-us-nat {
            background: rgba(168, 85, 247, 0.1);
            color: #c4b5fd;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .cas-number, .fema-number {
            font-family: 'Inter', monospace;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        .reach-status {
            display: inline-flex;
            align-items: center;
            gap: calc(var(--space-unit) * 1.5);
            font-size: 0.8125rem;
            font-weight: 500;
        }

        .reach-yes {
            color: var(--success);
        }

        .reach-no {
            color: var(--error);
        }

        .reach-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: box-shadow 0.25s var(--ease-out);
        }

        .reach-yes .reach-dot {
            background: var(--success);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .reach-no .reach-dot {
            background: var(--error);
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.4);
        }

        .view-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: transparent;
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s var(--ease-out);
            color: var(--text-tertiary);
        }

        .view-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(224, 122, 95, 0.25);
        }

        .view-btn:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(224, 122, 95, 0.2);
        }

        .view-btn svg {
            width: 18px;
            height: 18px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: calc(var(--space-unit) * 1);
            padding: calc(var(--space-unit) * 5);
            border-top: 1px solid var(--border-subtle);
            background: rgba(8, 12, 20, 0.3);
        }

        .pagination-btn {
            min-width: 40px;
            height: 40px;
            padding: 0 calc(var(--space-unit) * 1.5);
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s var(--ease-out);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pagination-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .pagination-btn:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(224, 122, 95, 0.15);
        }

        .pagination-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 2px 12px rgba(224, 122, 95, 0.25);
        }

        .pagination-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .pagination-arrow {
            width: 16px;
            height: 16px;
        }

        .cards-container {
            display: none;
        }

        .pagination-ellipsis {
            padding: 0 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .pagination-info {
            margin-left: calc(var(--space-unit) * 4);
            font-size: 0.8125rem;
            color: var(--text-tertiary);
        }

        .table-row-animate {
            opacity: 0;
            transform: translateX(-8px);
            animation: rowSlideIn 0.4s var(--ease-out) forwards;
        }

        @keyframes rowSlideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1024px) {
            .page-header, .search-wrapper, .table-section {
                padding-left: calc(var(--space-unit) * 4);
                padding-right: calc(var(--space-unit) * 4);
            }
        }

        @media (max-width: 768px) {
            .page-header {
                padding-top: calc(var(--space-unit) * 20);
            }

            .search-wrapper {
                padding: 0 calc(var(--space-unit) * 4);
            }

            .table-wrapper {
                display: none;
            }

            .cards-container {
                display: grid;
                grid-template-columns: 1fr;
                gap: calc(var(--space-unit) * 3);
                padding: calc(var(--space-unit) * 4);
            }

            .product-card {
                background: var(--bg-card);
                border: 1px solid var(--border-subtle);
                border-radius: 20px;
                padding: calc(var(--space-unit) * 4);
                display: flex;
                flex-direction: column;
                gap: calc(var(--space-unit) * 3);
                transition: all 0.3s var(--ease-out);
                animation: fadeSlideUp 0.5s var(--ease-out) both;
            }

            .product-card:hover {
                background: var(--bg-card-hover);
                border-color: var(--border-hover);
                transform: translateY(-4px);
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
            }

            .product-card-header {
                display: flex;
                align-items: center;
                gap: calc(var(--space-unit) * 3);
                padding-bottom: calc(var(--space-unit) * 2.5);
                border-bottom: 1px solid var(--border-subtle);
            }

            .product-card-icon {
                width: 48px;
                height: 48px;
                border-radius: 14px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.25rem;
                font-weight: 700;
                background: linear-gradient(135deg, rgba(224, 122, 95, 0.15) 0%, rgba(61, 139, 139, 0.1) 100%);
                border: 1px solid rgba(224, 122, 95, 0.2);
                color: var(--accent-light);
                flex-shrink: 0;
                cursor: pointer;
            }

            .product-card-title {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }

            .product-card-name {
                font-weight: 700;
                font-size: 1.0625rem;
                color: var(--text-primary);
                letter-spacing: -0.01em;
            }

            .product-card-group {
                font-size: 0.75rem;
                color: var(--text-tertiary);
                font-family: 'Inter', sans-serif;
            }

            .product-card-body {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: calc(var(--space-unit) * 2.5);
            }

            .product-card-field {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .product-card-label {
                font-size: 0.625rem;
                color: var(--text-tertiary);
                text-transform: uppercase;
                letter-spacing: 0.1em;
            }

            .product-card-value {
                font-size: 0.875rem;
                color: var(--text-secondary);
            }

            .product-card-value.badge {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: calc(var(--space-unit) * 0.75) calc(var(--space-unit) * 1.5);
                border-radius: 8px;
                font-size: 0.6875rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                width: fit-content;
            }

            .product-card-value.badge.biobased {
                background: rgba(16, 185, 129, 0.1);
                color: var(--success);
                border: 1px solid rgba(16, 185, 129, 0.2);
            }

            .product-card-value.badge.synthetic {
                background: rgba(99, 102, 241, 0.1);
                color: #a5b4fc;
                border: 1px solid rgba(99, 102, 241, 0.2);
            }

            .product-card-value.badge.eu-nat {
                background: rgba(245, 158, 11, 0.1);
                color: #fbbf24;
                border: 1px solid rgba(245, 158, 11, 0.2);
            }

            .product-card-value.badge.us-nat {
                background: rgba(168, 85, 247, 0.1);
                color: #c4b5fd;
                border: 1px solid rgba(168, 85, 247, 0.2);
            }

            .product-card-value.reach {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                width: fit-content;
            }

            .product-card-value.reach .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
            }

            .product-card-value.reach.yes .dot {
                background: var(--success);
                box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
            }

            .product-card-value.reach.no .dot {
                background: var(--error);
                box-shadow: 0 0 8px rgba(244, 63, 94, 0.4);
            }

            .product-card-footer {
                display: flex;
                justify-content: flex-end;
                padding-top: calc(var(--space-unit) * 2);
            }

            .product-card-btn {
                width: 100%;
                padding: calc(var(--space-unit) * 2.5);
                background: transparent;
                border: 1px solid var(--border-subtle);
                border-radius: 12px;
                color: var(--text-secondary);
                font-size: 0.875rem;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.25s var(--ease-out);
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
            }

            .product-card-btn:hover {
                background: var(--accent);
                border-color: var(--accent);
                color: white;
                box-shadow: 0 4px 20px rgba(224, 122, 95, 0.25);
            }

            .product-card-btn:focus {
                outline: none;
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(224, 122, 95, 0.15);
            }

        const itemsPerPage = 20;
        let currentPage = 1;
        let searchQuery = '';

        function filterProducts(query) {
            if (!query.trim()) {
                return products;
            }
            const lowerQuery = query.toLowerCase();
            return products.filter(product => 
                product.name.toLowerCase().includes(lowerQuery) ||
                product.group.toLowerCase().includes(lowerQuery) ||
                product.cas.toLowerCase().includes(lowerQuery) ||
                product.fema.toLowerCase().includes(lowerQuery) ||
                product.category.toLowerCase().includes(lowerQuery)
            );
        }

        function renderTable(page) {
            const filteredProducts = filterProducts(searchQuery);
            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredProducts.slice(start, end);

            const tbody = document.getElementById('table-body');
            tbody.innerHTML = pageItems.map((product, index) => `
                <tr class="table-row-animate" style="animation-delay: ${index * 0.03}s">

                    <td>

        function renderPagination() {
            const filteredProducts = filterProducts(searchQuery);
            const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
            const pagination = document.getElementById('pagination');
            const isMobile = window.innerWidth < 768;
            const maxVisiblePages = isMobile ? 5 : 10;

            let html = `
                <button class="pagination-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    <svg class="pagination-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 19l-7-7 7-7"></path>
                    </svg>
                </button>
            `;

            if (totalPages > maxVisiblePages) {
                let startPage, endPage;
                const halfVisible = Math.floor(maxVisiblePages / 2);
                
                if (currentPage <= halfVisible + 1) {
                    startPage = 1;
                    endPage = maxVisiblePages - 1;
                } else if (currentPage >= totalPages - halfVisible) {
                    startPage = totalPages - maxVisiblePages + 2;
                    endPage = totalPages;
                } else {
                    startPage = currentPage - halfVisible + 1;
                    endPage = currentPage + halfVisible;
                }

                if (startPage > 1) {
                    html += `<button class="pagination-btn ${1 === currentPage ? 'active' : ''}" onclick="changePage(1)">1</button>`;
                    if (startPage > 2) {
                        html += `<span class="pagination-ellipsis">...</span>`;
                    }
                }

                for (let i = startPage; i <= endPage; i++) {
                    html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                }

                if (endPage < totalPages) {
                    if (endPage < totalPages - 1) {
                        html += `<span class="pagination-ellipsis">...</span>`;
                    }
                    html += `<button class="pagination-btn ${totalPages === currentPage ? 'active' : ''}" onclick="changePage(${totalPages})">${totalPages}</button>`;
                }
            } else {
                for (let i = 1; i <= totalPages; i++) {
                    html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                }
            }

            html += `
                <button class="pagination-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    <svg class="pagination-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
                <span class="pagination-info">Showing ${(currentPage - 1) * itemsPerPage + 1}-${Math.min(currentPage * itemsPerPage, products.length)} of ${products.length} results</span>
            `;

            pagination.innerHTML = html;
        }

        function changePage(page) {
            const totalPages = Math.ceil(products.length / itemsPerPage);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable(currentPage);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const initialSearch = urlParams.get('search');
            if (initialSearch) {
                document.getElementById('search-input').value = initialSearch;
                searchQuery = initialSearch;
            }
            renderTable(1);
            
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                currentPage = 1;
                renderTable(1);
                renderPagination();
            });
            
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.reveal').forEach(el => {
                observer.observe(el);
            });
        });
